<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PrimeFit</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#050816;
color:white;
overflow-x:hidden;
}

/* BACKGROUND GLOW */

body::before{
content:'';
position:fixed;
top:-200px;
right:-150px;
width:500px;
height:500px;
background:#009dff25;
filter:blur(130px);
border-radius:50%;
z-index:-1;
}

body::after{
content:'';
position:fixed;
bottom:-250px;
left:-150px;
width:500px;
height:500px;
background:#004cff20;
filter:blur(130px);
border-radius:50%;
z-index:-1;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
left:0;
width:100%;
padding:22px 7%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(5,8,22,.72);
backdrop-filter:blur(14px);
z-index:999;
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
font-size:34px;
font-weight:800;
color:#39bcff;
text-shadow:0 0 20px #009dff;
}

nav{
display:flex;
gap:28px;
}

nav a{
text-decoration:none;
color:#d8e7ff;
font-weight:500;
transition:.3s;
}

nav a:hover{
color:#39bcff;
}

#languageSwitcher{
padding:12px 16px;
border-radius:16px;
border:1px solid rgba(57,188,255,.4);
background:#091120;
color:white;
outline:none;
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:140px 7% 80px;
gap:60px;
}

.hero-content{
flex:1;
max-width:650px;
}

.hero-content h1{
font-size:78px;
line-height:1;
font-weight:800;
margin-bottom:28px;
text-transform:uppercase;
}

.hero-content h1 span{
color:#39bcff;
text-shadow:0 0 20px #008cff;
}

.hero-content p{
font-size:20px;
line-height:1.8;
color:#c3d5ec;
margin-bottom:35px;
}

.hero-buttons{
display:flex;
gap:18px;
flex-wrap:wrap;
}

.hero-btn{
padding:18px 38px;
border:none;
border-radius:60px;
background:linear-gradient(90deg,#0077ff,#00bfff);
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.35s;
box-shadow:0 0 35px rgba(0,153,255,.4);
}

.hero-btn:hover{
transform:translateY(-4px) scale(1.05);
}

.secondary-btn{
background:transparent;
border:1px solid rgba(255,255,255,.15);
}

.hero-image{
flex:1;
display:flex;
justify-content:center;
}

.hero-image img{
width:100%;
max-width:550px;
border-radius:40px;
box-shadow:0 0 70px rgba(0,140,255,.18);
}

/* SECTION */

section{
padding:120px 7%;
}

.section-title{
text-align:center;
font-size:56px;
font-weight:800;
margin-bottom:60px;
}

/* MEMBERSHIP */

.trainer-toggle{
text-align:center;
margin-bottom:50px;
}

.trainer-toggle h2{
font-size:32px;
margin-bottom:25px;
}

.toggle-buttons{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.toggle-buttons button{
padding:16px 32px;
background:#101b30;
border:1px solid rgba(57,188,255,.3);
color:white;
border-radius:18px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.toggle-buttons button:hover{
background:#008cff;
}

.toggle-buttons .active{
background:#008cff;
}

.plans-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.plan-card{
background:linear-gradient(180deg,#0b1325,#101d35);
border-radius:32px;
padding:38px;
border:1px solid rgba(255,255,255,.06);
transition:.4s;
}

.plan-card:hover{
transform:translateY(-10px);
border-color:#009dff;
}

.plan-card h3{
font-size:34px;
margin-bottom:12px;
}

.price{
font-size:52px;
font-weight:800;
color:#39bcff;
margin-bottom:22px;
}

.plan-card ul{
list-style:none;
}

.plan-card li{
margin-bottom:14px;
color:#d5e6ff;
}

/* MOBILE */

@media(max-width:1000px){

.hero{
flex-direction:column;
text-align:center;
padding-top:170px;
}

.hero-content h1{
font-size:52px;
}

.hero-buttons{
justify-content:center;
}

.hero-content p{
font-size:17px;
}

nav{
flex-wrap:wrap;
justify-content:center;
}

.navbar{
flex-direction:column;
gap:20px;
padding:18px;
}

.section-title{
font-size:38px;
}

.plans-grid{
grid-template-columns:1fr;
}

.hero-image img{
max-width:100%;
}

}

</style>
</head>
<body>
